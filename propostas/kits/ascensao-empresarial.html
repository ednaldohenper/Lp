document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

max-width:680px;margin:0 0 28px\">Documento de referência visual do evento online com Ednaldo Henper. O clima do produto é o fogo da ascensão: preto-quente terroso, platina quente e luz laranja brasa. Espinha de marca Ednaldo Henper, regra 60 / 30 / 10.<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9C8A78;border:1px solid rgba(245,239,234,0.12);border-radius:4px;padding:7px 12px\">60 fundo<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#9C8A78;border:1px solid rgba(245,239,234,0.12);border-radius:4px;padding:7px 12px\">30 platina<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E2742E;border:1px solid rgba(226,116,46,0.32);border-radius:4px;padding:7px 12px\">10 luz laranja<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ===== 01 PALETA ===== -->\n    <section style=\"margin-bottom:clamp(56px,8vw,96px)\">\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#E2742E\">01<\u002Fspan>\n        <h2 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:clamp(24px,3.4vw,32px);color:#F8F3EE;margin:0\">Paleta<\u002Fh2>\n      <\u002Fdiv>\n      <hr style=\"border:0;height:1px;background:rgba(245,239,234,0.10);margin:0 0 30px\">\n\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:30px\">\n        <div style=\"border-radius:8px;overflow:hidden;border:1px solid rgba(245,239,234,0.09)\">\n          <div style=\"height:96px;background:#0E0905\"><\u002Fdiv>\n          <div style=\"padding:12px 14px;background:#1C1109\"> =\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#E2742E;margin-top:6px\">acesso único · ao vivo<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- lista numerada -->\n        <div style=\"flex:1 1 100%\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#6B5C4E;margin:6px 0 12px\">Lista numerada (pilares)<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:16px\">\n            <div style=\"flex:1 1 240px;background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:8px;padding:26px 24px\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#E2742E;margin-bottom:12px\">01<\u002Fdiv>\n              <h3 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:#F8F3EE;margin:0 0 8px\">A fase real do negócio<\u002Fh3>\n              <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#B8A696;margin:0\">Entre as 4 fases, exatamente onde você está.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"flex:1 1 240px;background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:8px;padding:26px 24px\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#E2742E;margin-bottom:12px\">02<\u002Fdiv>\n              <h3 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:#F8F3EE;margin:0 0 8px\">O limiar que trava<\u002Fh3>\n              <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#B8A696;margin:0\">Tempo, Dinheiro, Pessoas ou Rituais.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"flex:1 1 240px;background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:8px;padding:26px 24px\">\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#E2742E;margin-bottom:12px\">03<\u002Fdiv>\n              <h3 style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:20px;color:#F8F3EE;margin:0 0 8px\">O primeiro passo<\u002Fh3>\n              <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#B8A696;margin:0\">O que fazer na segunda de manhã.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 05 DIAGRAMA ===== -->\n    <section style=\"margin-bottom:clamp(40px,6vw,72px)\">\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#E2742E\">05<\u002Fspan>\n        <h2 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:clamp(24px,3.4vw,32px);color:#F8F3EE;margin:0\">Elemento-assinatura · A Rampa das 4 Fases<\u002Fh2>\n      <\u002Fdiv>\n      <hr style=\"border:0;height:1px;background:rgba(245,239,234,0.10);margin:0 0 30px\">\n\n      <div style=\"position:relative;background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:12px;padding:clamp(30px,5vw,56px) clamp(20px,4vw,48px);overflow:hidden\">\n        <div style=\"position:absolute;right:8%;bottom:0;width:420px;height:340px;background:radial-gradient(ellipse at center,rgba(226,116,46,0.18),rgba(226,116,46,0) 70%);filter:blur(8px);pointer-events:none\"><\u002Fdiv>\n        <svg viewBox=\"0 0 720 320\" style=\"position:relative;width:100%;height:auto;display:block\" xmlns=\"http://www.w3.org/2000/svg\">\n          <defs>\n            <linearGradient id=\"step\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n              <stop offset=\"0%\" stop-color=\"#F2A062\"><\u002Fstop><stop offset=\"58%\" stop-color=\"#E2742E\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#D5641E\"><\u002Fstop>\n            <\u002FlinearGradient>\n            <radialGradient id=\"peak\" cx=\"50%\" cy=\"40%\" r=\"60%\">\n              <stop offset=\"0%\" stop-color=\"#E2742E\"><\u002Fstop><stop offset=\"100%\" stop-color=\"#9A4A18\"><\u002Fstop>\n            <\u002FradialGradient>\n          <\u002Fdefs>\n          <!-- guia base -->\n          <line x1=\"40\" y1=\"290\" x2=\"680\" y2=\"290\" stroke=\"rgba(245,239,234,0.12)\" stroke-width=\"1\"><\u002Fline>\n          <!-- degraus apagados -->\n          <rect x=\"48\" y=\"218\" width=\"130\" height=\"72\" rx=\"2\" fill=\"#241710\" stroke=\"rgba(245,239,234,0.10)\"><\u002Frect>\n          <rect x=\"208\" y=\"170\" width=\"130\" height=\"120\" rx=\"2\" fill=\"#241710\" stroke=\"rgba(245,239,234,0.10)\"><\u002Frect>\n          <rect x=\"368\" y=\"118\" width=\"130\" height=\"172\" rx=\"2\" fill=\"#241710\" stroke=\"rgba(245,239,234,0.10)\"><\u002Frect>\n          <!-- degrau de foco -->\n          <rect x=\"528\" y=\"64\" width=\"130\" height=\"226\" rx=\"2\" fill=\"url(#step)\"><\u002Frect>\n          <!-- pico / A ascendente -->\n          <g transform=\"translate(593,18)\">\n            <circle cx=\"0\" cy=\"-2\" r=\"6\" fill=\"url(#peak)\"><\u002Fcircle>\n            <path d=\"M0 6 L20 44 L9 44 L0 24 L-9 44 L-20 44 Z\" fill=\"url(#peak)\"><\u002Fpath>\n          <\u002Fg>\n          <!-- números -->\n          <text x=\"113\" y=\"262\" font-family=\"'JetBrains Mono',monospace\" font-size=\"22\" font-weight=\"700\" fill=\"#9C8A78\" text-anchor=\"middle\">01<\u002Ftext>\n          <text x=\"273\" y=\"238\" font-family=\"'JetBrains Mono',monospace\" font-size=\"22\" font-weight=\"700\" fill=\"#9C8A78\" text-anchor=\"middle\">02<\u002Ftext>\n          <text x=\"433\" y=\"210\" font-family=\"'JetBrains Mono',monospace\" font-size=\"22\" font-weight=\"700\" fill=\"#B8A696\" text-anchor=\"middle\">03<\u002Ftext>\n          <text x=\"593\" y=\"186\" font-family=\"'JetBrains Mono',monospace\" font-size=\"22\" font-weight=\"700\" fill=\"#160E08\" text-anchor=\"middle\">04<\u002Ftext>\n          <!-- labels -->\n          <text x=\"113\" y=\"312\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" letter-spacing=\"1.2\" fill=\"#9C8A78\" text-anchor=\"middle\">SOBREVIVÊNCIA<\u002Ftext>\n          <text x=\"273\" y=\"312\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" letter-spacing=\"1.2\" fill=\"#9C8A78\" text-anchor=\"middle\">TRAÇÃO<\u002Ftext>\n          <text x=\"433\" y=\"312\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" letter-spacing=\"1.2\" fill=\"#9C8A78\" text-anchor=\"middle\">ESCALA<\u002Ftext>\n          <text x=\"593\" y=\"312\" font-family=\"'JetBrains Mono',monospace\" font-size=\"12\" letter-spacing=\"1.2\" fill=\"#F0995A\" text-anchor=\"middle\">LEGADO<\u002Ftext>\n        <\u002Fsvg>\n        <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.7;color:#B8A696;margin:26px 0 0;max-width:680px\">Degraus subindo da esquerda (baixo) para a direita (alto). Apagados em âmbar com borda hairline; o degrau de foco em gradiente laranja com glow. O pico do <span style=\"color:#E2742E\">\"A\" ascendente<\u002Fspan> sintetiza a Ascensão. Acende-se a fase atual do participante.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== FECHO ===== -->\n    <section>\n      <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:8px\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700;color:#E2742E\">·<\u002Fspan>\n        <h2 style=\"font-family:'Playfair Display',Georgia,serif;font-weight:600;font-size:clamp(22px,3vw,28px);color:#F8F3EE;margin:0\">Fecho<\u002Fh2>\n      <\u002Fdiv>\n      <hr style=\"border:0;height:1px;background:rgba(245,239,234,0.10);margin:0 0 24px\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px\">\n        <div style=\"background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:8px;padding:24px 22px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#E2742E;margin-bottom:10px\">Cantos<\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#B8A696;margin:0\">2px nos chips, 6–8px em botões e cards, 12–14px em vídeo e card de preço. 999px só em pílulas. Geometria angular.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:8px;padding:24px 22px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#E2742E;margin-bottom:10px\">Sombra é luz<\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#B8A696;margin:0\">Sobre preto, a elevação vem do glow laranja. Sombra escura só para destacar foto do fundo.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#1C1109;border:1px solid rgba(245,239,234,0.09);border-radius:8px;padding:24px 22px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#E2742E;margin-bottom:10px\">Movimento<\u002Fdiv>\n          <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:15px;line-height:1.6;color:#B8A696;margin:0\">Fades e slides curtos. Easing cubic-bezier(.22,.61,.36,1), 140–480ms. Pulso do play em 3.2s. Sem bounce.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6B5C4E;margin:40px 0 0\">Voz: ciência fria + provocação calorosa · © Instituto Foco Ltda<\u002Fp>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
