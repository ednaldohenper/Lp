document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

— Fundos: o mistério do Mago */\n  --black-900: #0D0D11;   /* Preto Profundo — fundo principal da marca */\n  --black-800: #131319;   /* superfície elevada sutil */\n  --black-700: #1A1A22;   /* cards / blocos sobre o fundo */\n  --black-600: #24242F;   /* hover de superfície / divisórias densas */\n\n  /* 30% — Texto & estrutura: a clareza do Sábio */\n  --white:        #FFFFFF; /* Branco Puro — títulos, destaque máximo */\n  --platinum-100: #E2E8F0; /* Cinza Platinado — texto corrido sobre preto */\n  --platinum-300: #A8B0BE; /* texto secundário / legendas */\n  --platinum-500: #6B7280; /* texto terciário / metadados, desabilitado */\n\n  /* 10% — Luz & destaque: usar SÓ em palavras-chave e linhas finas */\n  --purple-cosmic: #4F46E5; /* Roxo Cósmico (primário de destaque) */\n  --purple-deep:   #6D28D9; /* Roxo Cósmico (variante profunda) */\n  --blue-night:    #1E40AF; /* Azul Noturno (destaque alternativo) */\n  --purple-glow:   #7C6BFF; /* roxo luminoso p/ glow / hover de link */\n\n  /* Aliases semânticos de cor */\n  --bg:            var(--black-900);\n  --bg-elevated:   var(--black-700);\n  --surface:       var(--black-700);\n  --surface-hover: var(--black-600);\n\n  --fg1: var(--white);        /* texto/títulos de maior contraste */\n  --fg2: var(--platinum-100); /* corpo */\n  --fg3: var(--platinum-300); /* secundário */\n  --fg4: var(--platinum-500); /* terciário / metadados */\n\n  --accent:        var(--purple-cosmic); /* destaque primário (a palavra-chave) */\n  --accent-alt:    var(--blue-night);    /* destaque alternativo */\n  --accent-strong: var(--purple-deep);\n\n  /* Linhas finas (efeito \"relatório científico\") */\n  --hairline:        rgba(226, 232, 240, 0.14); /* 1px sobre preto */\n  --hairline-strong: rgba(226, 232, 240, 0.28);\n  --hairline-accent: rgba(79, 70, 229, 0.55);   /* divisória de destaque */\n\n  /* Glow / luz de fundo (círculo desfocado atrás do conteúdo) */\n  --glow-purple: radial-gradient(circle, rgba(79,70,229,0.40) 0%, rgba(79,70,229,0) 70%);\n  --glow-blue:   radial-gradient(circle, rgba(30,64,175,0.38) 0%, rgba(30,64,175,0) 70%);\n\n  /* ---------------------------------------------------------------------- */\n  /* TYPOGRAPHY                                                             */\n  /* ---------------------------------------------------------------------- */\n  --font-display: 'Cinzel', 'Playfair Display', Georgia, serif;   /* O Sábio */\n  --font-serif:   'Playfair Display', Georgia, serif;             /* editorial */\n  --font-mono:    'JetBrains Mono', 'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace; /* O Mago */\n  --font-body:    var(--font-mono); /* corpo é monoespaçado por padrão */\n\n  /* Escala tipográfica (1.250 — terça maior). Base 16px. */\n  --text-2xs: 0.694rem;  /* 11.1px — micro labels mono */\n  --text-xs:  0.8rem;    /* 12.8px */\n  --text-sm:  0.875rem;  /* 14px */\n  --text-base:1rem;      /* 16px */\n  --text-md:  1.25rem;   /* 20px */\n  --text-lg:  1.563rem;  /* 25px */\n  --text-xl:  1.953rem;  /* 31px */\n  --text-2xl: 2.441rem;  /* 39px */\n  --text-3xl: 3.052rem;  /* 49px */\n  --text-4xl: 3.815rem;  /* 61px */\n  --text-5xl: 4.768rem;  /* 76px */\n\n  --leading-tight: 1.05;\n  --leading-snug:  1.2;\n  --leading-normal:1.5;\n  --leading-loose: 1.7;\n\n  /* Tracking — Cinzel respira melhor com tracking aberto; mono fica apertado */\n  --tracking-display: 0.06em;  /* títulos serifados em caixa alta */\n  --tracking-wide:    0.18em;  /* eyebrows / labels mono em caixa alta */\n  --tracking-mono:    0.01em;\n  --tracking-tight:  -0.01em;\n\n  /* ---------------------------------------------------------------------- */\n  /* SPACING / RADIUS / ELEVATION                                           */\n  /* ---------------------------------------------------------------------- */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;  --space-4: 16px;\n  --space-5: 24px;  --space-6: 32px;  --space-7: 48px;  --space-8: 64px;\n  --space-9: 96px;  --space-10: 128px;\n\n  /* Cantos: a marca é geométrica e sóbria. Raios pequenos. */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 8px;\n  --radius-pill: 999px;\n\n  /* Sombras: sobre preto, \"elevação\" vem da luz (glow), não de sombra escura. */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.6);\n  --shadow-md: 0 8px 24px rgba(0,0,0,0.55);\n  --shadow-glow: 0 0 48px rgba(79,70,229,0.25);\n\n  --ring-accent: 0 0 0 1px rgba(79,70,229,0.6);\n\n  /* Movimento: discreto, sem bounce. Fades e slides curtos. */\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1);\n  --dur-fast: 140ms;\n  --dur: 240ms;\n  --dur-slow: 480ms;\n}\n\n/* ============================================================================\n   SEMANTIC ELEMENT STYLES — opcional, mas úteis como referência viva.\n   Aplique a classe .eh para herdar o ambiente da marca.\n   ========================================================================== */\n.eh {\n  background: var(--bg);\n  color: var(--fg2);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Eyebrow / kicker — \"[Análise Comportamental]\" */\n.eh-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--text-2xs);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--accent);\n  font-weight: 500;\n}\n\n/* Títulos — O Sábio (Cinzel, caixa alta) */\n.eh-h1 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: clamp(2.4rem, 5vw, var(--text-5xl));\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n  text-wrap: balance;\n}\n.eh-h2 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: clamp(1.8rem, 4vw, var(--text-3xl));\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n.eh-h3 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n\n/* A palavra-chave pintada de roxo/azul */\n.eh-key { color: var(--accent); }\n.eh-key--blue { color: var(--accent-alt); }\n\n/* Corpo — O Mago (monoespaçado) */\n.eh-body {\n  font-family: var(--font-mono);\n  font-weight: 400;\n  font-size: var(--text-base);\n  line-height: var(--leading-loose);\n  color: var(--fg2);\n}\n.eh-small {\n  font-family: var(--font-mono);\n  font-size: var(--text-sm);\n  line-height: var(--leading-normal);\n  color: var(--fg3);\n}\n\n/* Numeração de carrossel — 01 / 02 / 03 */\n.eh-index {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: var(--text-md);\n  letter-spacing: var(--tracking-mono);\n  color: var(--accent);\n}\n\n/* Linha fina divisória */\n.eh-rule { height: 1px; border: 0; background: var(--hairline); }\n.eh-rule--accent { background: var(--hairline-accent); }\n<\u002Fstyle>\n  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n  <style>/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"8d8e4a3e-32b8-4aab-8bac-c56fe2e59a2c\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"cf28be54-2f62-4576-8f1a-b1dff9e7d55c\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 400;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"93855575-d246-4184-b8ee-8da515d081df\") forma order-radius:5px;overflow:hidden;background:#1B1228\">\n          <div style=\"height:78px;background:{{ sw.css }};border-bottom:1px solid rgba(226,232,240,.07)\"><\u002Fdiv>\n          <div style=\"padding:11px 13px\">\n            <p style=\"font-size:12.5px;color:#fff;margin:0 0 3px;font-weight:500\">{{ sw.name }}<\u002Fp>\n            <p class=\"kit-cap\">{{ sw.hex }}<\u002Fp>\n            <p class=\"kit-cap\" style=\"color:#A78BC9\">{{ sw.role }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:72px\">\n      <span style=\"height:2px;width:44px;background:#C9A24A;flex:0 0 auto\"><\u002Fspan>\n      <p class=\"kit-cap\" style=\"color:#C9A24A\">Dourado #C9A24A · fio fino de família, usar só em detalhe<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 02 TIPOGRAFIA -->\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:28px\">\n      <span class=\"kit-secnum\">02<\u002Fspan>\n      <h2 class=\"kit-h2\">Tipografia<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:2px;border-top:1px solid rgba(226,232,240,.1);margin-bottom:72px\">\n      <div style=\"display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:24px;align-items:baseline;padding:26px 0;border-bottom:1px solid rgba(226,232,240,.09)\">\n        <span style=\"font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(1.8rem,4vw,2.8rem);line-height:1.05;color:#fff\">Clareza do que <span style=\"font-style:italic;color:#A78BC9\">importa<\u002Fspan><\u002Fspan>\n        <div><p style=\"font-size:13px;color:#E2E8F0;margin:0 0 4px;font-weight:500\">Playfair Display<\u002Fp><p class=\"kit-cap\">Títulos · 600 · itálico no acento<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:24px;align-items:baseline;padding:26px 0;border-bottom:1px solid rgba(226,232,240,.09)\">\n        <span style=\"font-family:'IBM Plex Sans',sans-serif;font-size:17px;line-height:1.7;color:#C9D1DE;max-width:440px\">Corpo de texto em IBM Plex Sans. Direto, com ar negativo generoso e foco na leitura.<\u002Fspan>\n        <div><p style=\"font-size:13px;color:#E2E8F0;margin:0 0 4px;font-weight:500\">IBM Plex Sans<\u002Fp><p class=\"kit-cap\">Corpo · 400 / 500<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:minmax(0,1fr) 220px;gap:24px;align-items:baseline;padding:26px 0;border-bottom:1px solid rgba(226,232,240,.09)\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:#A8B0BE\">[ Label · 01 · Eyebrow ]<\u002Fspan>\n        <div><p style=\"font-size:13px;color:#E2E8F0;margin:0 0 4px;font-weight:500\">JetBrains Mono<\u002Fp><p class=\"kit-cap\">Labels · números · CTA<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 03 ELEMENTOS -->\n    <div style=\"display:flex;align-items:baseline;gap:14px;margin-bottom:28px\">\n      <span class=\"kit-secnum\">03<\u002Fspan>\n      <h2 class=\"kit-h2\">Elementos<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:72px\">\n\n      <div style=\"border:1px solid rgba(226,232,240,.1);border-radius:5px;background:#1B1228;padding:26px;display:flex;flex-direction:column;gap:18px;min-height:150px\">\n        <div style=\"flex:1;display:flex;align-items:center\">\n          <div style=\"display:flex;align-items:center;gap:13px\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#A78BC9\">[ A virada ]<\u002Fspan><span style=\"height:1px;width:46px;background:rgba(123,94,168,.55)\"><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"kit-cap\">Eyebrow · JetBrains Mono 11px · #A78BC9 + fio 1px<\u002Fp>\n      <\u002Fdiv>\n\n      <div style
