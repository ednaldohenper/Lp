document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"32358e42-413b-46b9-a41a-33237946e728\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"409120c8-6841-464b-a915-fe0d67cb8f90\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"5edf6fb8-7229-4416-9451-b9a5e4e49d3c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c35b7d18-1ca0-435b-aaca-39168dd82959\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------------------------------------------------------------------- */\n  /* COLOR — Regra 60 / 30 / 10                                             */\n  /* 60% fundo (preto profundo) · 30% texto (branco/platina) · 10% luz (roxo/azul) */\n  /* ---------------------------------------------------------------------- */\n\n  /* 60% — Fundos: o mistério do Mago */\n  --black-900: #0D0D11;   /* Preto Profundo — fundo principal da marca */\n  --black-800: #131319;   /* superfície elevada sutil */\n  --black-700: #1A1A22;   /* cards / blocos sobre o fundo */\n  --black-600: #24242F;   /* hover de superfície / divisórias densas */\n\n  /* 30% — Texto & estrutura: a clareza do Sábio */\n  --white:        #FFFFFF; /* Branco Puro — títulos, destaque máximo */\n  --platinum-100: #E2E8F0; /* Cinza Platinado — texto corrido sobre preto */\n  --platinum-300: #A8B0BE; /* texto secundário / legendas */\n  --platinum-500: #6B7280; /* texto terciário / metadados, desabilitado */\n\n  /* 10% — Luz & destaque: usar SÓ em palavras-chave e linhas finas */\n  --purple-cosmic: #4F46E5; /* Roxo Cósmico (primário de destaque) */\n  --purple-deep:   #6D28D9; /* Roxo Cósmico (variante profunda) */\n  --blue-night:    #1E40AF; /* Azul Noturno (destaque alternativo) */\n  --purple-glow:   #7C6BFF; /* roxo luminoso p/ glow / hover de link */\n\n  /* Aliases semânticos de cor */\n  --bg:            var(--black-900);\n  --bg-elevated:   var(--black-700);\n  --surface:       var(--black-700);\n  --surface-hover: var(--black-600);\n\n  --fg1: var(--white);        /* texto/títulos de maior contraste */\n  --fg2: var(--platinum-100); /* corpo */\n  --fg3: var(--platinum-300); /* secundário */\n  --fg4: var(--platinum-500); /* terciário / metadados */\n\n  --accent:        var(--purple-cosmic); /* destaque primário (a palavra-chave) */\n  --accent-alt:    var(--blue-night);    /* destaque alternativo */\n  --accent-strong: var(--purple-deep);\n\n  /* Linhas finas (efeito \"relatório científico\") */\n  --hairline:        rgba(226, 232, 240, 0.14); /* 1px sobre preto */\n  --hairline-strong: rgba(226, 232, 240, 0.28);\n  --hairline-accent: rgba(79, 70, 229, 0.55);   /* divisória de destaque */\n\n  /* Glow / luz de fundo (círculo desfocado atrás do conteúdo) */\n  --glow-purple: radial-gradient(circle, rgba(79,70,229,0.40) 0%, rgba(79,70,229,0) 70%); /* @kind other */\n  --glow-blue:   radial-gradient(circle, rgba(30,64,175,0.38) 0%, rgba(30,64,175,0) 70%); /* @kind other */\n\n  /* ---------------------------------------------------------------------- */\n  /* TYPOGRAPHY                                                             */\n  /* ---------------------------------------------------------------------- */\n  --font-display: 'Cinzel', 'Playfair Display', Georgia, serif;   /* O Sábio */\n  --font-serif:   'Playfair Display', Georgia, serif;             /* editorial */\n  --font-sans:    'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; /* corpo padrão */\n  --font-mono:    'JetBrains Mono', 'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace; /* O Mago — dados/labels */\n  --font-body:    var(--font-sans); /* corpo é sans humanista (Hanken Grotesk) por padrão */\n\n  /* Escala tipográfica (1.250 — terça maior). Base 16px. */\n  --text-2xs: 0.694rem;  /* 11.1px — micro labels mono */\n  --text-xs:  0.8rem;    /* 12.8px */\n  --text-sm:  0.875rem;  /* 14px */\n  --text-base:1rem;      /* 16px */\n  --text-md:  1.25rem;   /* 20px */\n  --text-lg:  1.563rem;  /* 25px */\n  --text-xl:  1.953rem;  /* 31px */\n  --text-2xl: 2.441rem;  /* 39px */\n  --text-3xl: 3.052rem;  /* 49px */\n  --text-4xl: 3.815rem;  /* 61px */\n  --text-5xl: 4.768rem;  /* 76px */\n\n  --leading-tight: 1.05;\n  --leading-snug:  1.2;\n  --leading-normal:1.5;\n  --leading-loose: 1.7;\n\n  /* Tracking — Cinzel respira melhor com tracking aberto; mono fica apertado */\n  --tracking-display: 0.06em;  /* títulos serifados em caixa alta */\n  --tracking-wide:    0.18em;  /* eyebrows / labels mono em caixa alta */\n  --tracking-mono:    0.01em;\n  --tracking-tight:  -0.01em;\n\n  /* ---------------------------------------------------------------------- */\n  /* SPACING / RADIUS / ELEVATION                                           */\n  /* ---------------------------------------------------------------------- */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;  --space-4: 16px;\n  --space-5: 24px;  --space-6: 32px;  --space-7: 48px;  --space-8: 64px;\n  --space-9: 96px;  --space-10: 128px;\n\n  /* Cantos: a marca é geométrica e sóbria. Raios pequenos. */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 8px;\n  --radius-pill: 999px;\n\n  /* Sombras: sobre preto, \"elevação\" vem da luz (glow), não de sombra escura. */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.6);\n  --shadow-md: 0 8px 24px rgba(0,0,0,0.55);\n  --shadow-glow: 0 0 48px rgba(79,70,229,0.25);\n\n  --ring-accent: 0 0 0 1px rgba(79,70,229,0.6);\n\n  /* Movimento: discreto, sem bounce. Fades e slides curtos. */\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur: 240ms; /* @kind other */\n  --dur-slow: 480ms; /* @kind other */\n}\n\n/* ============================================================================\n   SEMANTIC ELEMENT STYLES — opcional, mas úteis como referência viva.\n   Aplique a classe .eh para herdar o ambiente da marca.\n   ========================================================================== */\n.eh {\n  background: var(--bg);\n  color: var(--fg2);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Eyebrow / kicker — \"[Análise Comportamental]\" */\n.eh-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--text-2xs);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--accent);\n  font-weight: 500;\n}\n\n/* Títulos — O Sábio (Cinzel, caixa alta) */\n.eh-h1 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: clamp(2.4rem, 5vw, var(--text-5xl));\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n  text-wrap: balance;\n}\n.eh-h2 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: clamp(1.8rem, 4vw, var(--text-3xl));\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n.eh-h3 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n\n/* A palavra-chave pintada de roxo/azul */\n.eh-key { color: var(--accent); }\n.eh-key--blue { color: var(--accent-alt); }\n\n/* Corpo — sans humanista (Hanken Grotesk), leitura limpa */\n.eh-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--text-base);\n  line-height: var(--leading-loose);\n  color: var(--fg2);\n}\n.eh-small {\n  font-family: var(--font-body);\n  font-size: var(--text-sm);\n  line-height: var(--leading-normal);\n  color: var(--fg3);\n}\n\n/* Numeração de carrossel — 01 / 02 / 03 */\n.eh-index {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: var(--text-md);\n  letter-spacing: var(--tracking-mono);\n  color: var(--accent);\n}\n\n/* Linha fina divisória */\n.eh-rule { height: 1px; border: 0; background: var(--hairline); }\n.eh-rule--accent { background: var(--hairline-accent); }\n<\u002Fstyle>\n<style>/* ============================================================================\n   EDNALDO HENPER — DESIGN TOKENS\n   Cientista do comportamento & estrategista de negócios\n   Arquétipos: O Sábio (serifa, tradição, autoridade) + O Mago (mono, ciência, dados)\n   ----------------------------------------------------------------------------\n   Fonts are loaded from Google Fonts (see @import below). To make the system\n   fully offline, drop the woff2 files into /fonts and swap the @import for\n   @font-face rules. Families used:\n     - Cinzel        (display / títulos — serifa em CAIXA ALTA)  -> \"O   font-weight: 700;\n  font-display: swap;\n  src: url(\"5edf6fb8-7229-4416-9451-b9a5e4e49d3c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c35b7d18-1ca0-435b-aaca-39168dd82959\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------------------------------------------------------------------- */\n  /* COLOR — Regra 60 / 30 / 10                                             */\n  /* 60% fundo (preto profundo) · 30% texto (branco/platina) · 10% luz (roxo/azul) */\n  /* ---------------------------------------------------------------------- */\n\n  /* 60% — Fundos: o mistério do Mago */\n  --black-900: #0D0D11;   /* Preto Profundo — fundo principal da marca */\n  --black-800: #131319;   /* superfície elevada sutil */\n  --black-700: #1A1A22;   /* cards / blocos sobre o fundo */\n  --black-600: #24242F;   /* hover de superfície / divisórias densas */\n\n  /* 30% — Texto & estrutura: a clareza do Sábio */\n  --white:        #FFFFFF; /* Branco Puro — títulos, destaque máximo */\n  --platinum-100: #E2E8F0; /* Cinza Platinado — texto corrido sobre preto */\n  --platinum-300: #A8B0BE; /* texto secundário / legendas */\n  --platinum-500: #6B7280; /* texto terciário / metadados, desabilitado */\n\n  /* 10% — Luz & destaque: usar SÓ em palavras-chave e linhas finas */\n  --purple-cosmic: #4F46E5; /* Roxo Cósmico (primário de destaque) */\n  --purple-deep:   #6D28D9; /* Roxo Cósmico (variante profunda) */\n  --blue-night:    #1E40AF; /* Azul Noturno (destaque alternativo) */\n  --purple-glow:   #7C6BFF; /* roxo luminoso p/ glow / hover de link */\n\n  /* Aliases semânticos de cor */\n  --bg:            var(--black-900);\n  --bg-elevated:   var(--black-700);\n  --surface:       var(--black-700);\n  --surface-hover: var(--black-600);\n\n  --fg1: var(--white);        /* texto/títulos de maior contraste */\n  --fg2: var(--platinum-100); /* corpo */\n  --fg3: var(--platinum-300); /* secundário */\n  --fg4: var(--platinum-500); /* terciário / metadados */\n\n  --accent:        var(--purple-cosmic); /* destaque primário (a palavra-chave) */\n  --accent-alt:    var(--blue-night);    /* destaque alternativo */\n  --accent-strong: var(--purple-deep);\n\n  /* Linhas finas (efeito \"relatório científico\") */\n  --hairline:        rgba(226, 232, 240, 0.14); /* 1px sobre preto */\n  --hairline-strong: rgba(226, 232, 240, 0.28);\n  --hairline-accent: rgba(79, 70, 229, 0.55);   /* divisória de destaque */\n\n  /* Glow / luz de fundo (círculo desfocado atrás do conteúdo) */\n  --glow-purple: radial-gradient(circle, rgba(79,70,229,0.40) 0%, rgba(79,70,229,0) 70%); /* @kind other */\n  --glow-blue:   radial-gradient(circle, rgba(30,64,175,0.38) 0%, rgba(30,64,175,0) 70%); /* @kind other */\n\n  /* ---------------------------------------------------------------------- */\n  /* TYPOGRAPHY                                                             */\n  /* ---------------------------------------------------------------------- */\n  --font-display: 'Cinzel', 'Playfair Display', Georgia, serif;   /* O Sábio */\n  --font-serif:   'Playfair Display', Georgia, serif;             /* editorial */\n  --font-sans:    'Hanken Grotesk', system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; /* corpo padrão */\n  --font-mono:    'JetBrains Mono', 'Space Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace; /* O Mago — dados/labels */\n  --font-body:    var(--font-sans); /* corpo é sans humanista (Hanken Grotesk) por padrão */\n\n  /* Escala tipográfica (1.250 — terça maior). Base 16px. */\n  --text-2xs: 0.694rem;  /* 11.1px — micro labels mono */\n  --text-xs:  0.8rem;    /* 12.8px */\n  --text-sm:  0.875rem;  /* 14px */\n  --text-base:1rem;      /* 16px */\n  --text-md:  1.25rem;   /* 20px */\n  --text-lg:  1.563rem;  /* 25px */\n  --text-xl:  1.953rem;  /* 31px */\n  --text-2xl: 2.441rem;  /* 39px */\n  --text-3xl: 3.052rem;  /* 49px */\n  --text-4xl: 3.815rem;  /* 61px */\n  --text-5xl: 4.768rem;  /* 76px */\n\n  --leading-tight: 1.05;\n  --leading-snug:  1.2;\n  --leading-normal:1.5;\n  --leading-loose: 1.7;\n\n  /* Tracking — Cinzel respira melhor com tracking aberto; mono fica apertado */\n  --tracking-display: 0.06em;  /* títulos serifados em caixa alta */\n  --tracking-wide:    0.18em;  /* eyebrows / labels mono em caixa alta */\n  --tracking-mono:    0.01em;\n  --tracking-tight:  -0.01em;\n\n  /* ---------------------------------------------------------------------- */\n  /* SPACING / RADIUS / ELEVATION                                           */\n  /* ---------------------------------------------------------------------- */\n  --space-1: 4px;   --space-2: 8px;   --space-3: 12px;  --space-4: 16px;\n  --space-5: 24px;  --space-6: 32px;  --space-7: 48px;  --space-8: 64px;\n  --space-9: 96px;  --space-10: 128px;\n\n  /* Cantos: a marca é geométrica e sóbria. Raios pequenos. */\n  --radius-none: 0px;\n  --radius-sm: 2px;\n  --radius-md: 4px;\n  --radius-lg: 8px;\n  --radius-pill: 999px;\n\n  /* Sombras: sobre preto, \"elevação\" vem da luz (glow), não de sombra escura. */\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.6);\n  --shadow-md: 0 8px 24px rgba(0,0,0,0.55);\n  --shadow-glow: 0 0 48px rgba(79,70,229,0.25);\n\n  --ring-accent: 0 0 0 1px rgba(79,70,229,0.6);\n\n  /* Movimento: discreto, sem bounce. Fades e slides curtos. */\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --dur-fast: 140ms; /* @kind other */\n  --dur: 240ms; /* @kind other */\n  --dur-slow: 480ms; /* @kind other */\n}\n\n/* ============================================================================\n   SEMANTIC ELEMENT STYLES — opcional, mas úteis como referência viva.\n   Aplique a classe .eh para herdar o ambiente da marca.\n   ========================================================================== */\n.eh {\n  background: var(--bg);\n  color: var(--fg2);\n  font-family: var(--font-body);\n  font-size: var(--text-base);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n}\n\n/* Eyebrow / kicker — \"[Análise Comportamental]\" */\n.eh-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--text-2xs);\n  letter-spacing: var(--tracking-wide);\n  text-transform: uppercase;\n  color: var(--accent);\n  font-weight: 500;\n}\n\n/* Títulos — O Sábio (Cinzel, caixa alta) */\n.eh-h1 {\n  font-family: var(--font-display);\n  font-weight: 700;\n  font-size: clamp(2.4rem, 5vw, var(--text-5xl));\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n  text-wrap: balance;\n}\n.eh-h2 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: clamp(1.8rem, 4vw, var(--text-3xl));\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n.eh-h3 {\n  font-family: var(--font-display);\n  font-weight: 600;\n  font-size: var(--text-xl);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-display);\n  text-transform: uppercase;\n  color: var(--fg1);\n}\n\n/* A palavra-chave pintada de roxo/azul */\n.eh-key { color: var(--accent); }\n.eh-key--blue { color: var(--accent-alt); }\n\n/* Corpo — sans humanista (Hanken Grotesk), leitura limpa */\n.eh-body {\n  font-family: var(--font-body);\n  font-weight: 400;\n  font-size: var(--text-base);\n  line-height: var(--leading-loose);\n  color: var(--fg2);\n}\n.eh-small {\n  font-family: var(--font-body);\n  font-size: var(--text-sm);\n  line-height: var(--leading-normal);\n  color: var(--fg3);\n}\n\n/* Numeração de carrossel — 01 / 02 / 03 */\n.eh-index {\n  font-family: var(--font-mono);\n  font-weight: 700;\n  font-size: var(--text-md);\n  letter-spacing: var(--tracking-mono);\n  color: var(--accent);\n}\n\n/* Linha fina divisória */\n.eh-rule { height: 1px; border: 0; background: var(--hairline); }\n.eh-rule--accent { background: var(--hairline-accent); }\n<\u002Fstyle>\n<style>\n  html,body{margin:0;padding:0;background:#0D0D11;}\n  *{box-sizing:border-box;}\n  ::selection{background:rgba(30,64,175,0.4);color:#fff;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"background:#0D0D11;color:#B4B8C4;font-family:var(--font-sans);position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0 0 auto;height:620px;pointer-events:none;background:radial-gradient(80% 60% at 50% -5%, rgba(30,64,175,0.18), transparent 60%);z-index:0;\"><\u002Fdiv>\n\n  <!-- HEADER -->\n  <header style=\"position:relative;z-index:2;max-width:none;margin:0 auto;padding:clamp(48px,7vw,96px) clamp(32px,5vw,88px) clamp(32px,4vw,56px);\">\n    <div style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:#6E92F0;margin-bottom:24px;\">[ Kit de Estilo ]<\u002Fdiv>\n    <h1 style=\"font-family:var(--font-serif);font-weight:600;font-size:clamp(40px,6vw,76px);line-height:1.04;letter-spacing:-0.015em;color:#fff;margin:0 0 22px;\">Ciclo da <em style=\"font-style:italic;color:#6E92F0;\">Inovação<\u002Fem><\u002Fh1>\n    <p style=\"font-family:var(--font-sans);font-size:clamp(16px,1.7vw,19px);line-height:1.7;color:#B4B8C4;max-width:620px;margin:0;\">Referência visual do produto. Clima sóbrio, noturno, estratégico: o azul profundo de quem cruzou o primeiro limiar e agora conduz a travessia. Diferente do roxo do Protocolo Maestria e do turquesa da Chave do Tempo.<\u002Fp>\n    <div style=\"height:1px;background:rgba(226,232,240,0.1);margin-top:clamp(32px,4vw,52px);\"><\u002Fdiv>\n  <\ m:16px;\">Você recebe<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:11px;\">\n            <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"color:#6E92F0;\">✓<\u002Fspan><span style=\"font-family:var(--font-sans);font-size:15px;color:#E2E8F0;\">Mentoria coletiva quinzenal ao vivo<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"color:#6E92F0;\">✓<\u002Fspan><span style=\"font-family:var(--font-sans);font-size:15px;color:#E2E8F0;\">Plataforma FOCO360 · 11 ferramentas<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:11px;align-items:flex-start;\"><span style=\"color:#6E92F0;\">✓<\u002Fspan><span style=\"font-family:var(--font-sans);font-size:15px;color:#E2E8F0;\">Encontro Presencial Anual<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:18px;padding:16px;background:rgba(201,162,74,0.07);border:1px solid rgba(201,162,74,0.4);border-radius:4px;\"><div style=\"font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:#C9A24A;margin-bottom:6px;\">Bônus de fundador<\u002Fdiv><div style=\"font-family:var(--font-serif);font-weight:600;font-size:17px;color:#fff;\">Mentorado por um Dia<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <!-- proof -->\n        <div style=\"padding:28px;background:#1A1A22;border:1px solid rgba(226,232,240,0.09);border-radius:6px;\">\n          <div style=\"font-family:var(--font-mono);font-weight:700;font-size:38px;color:#6E92F0;line-height:1;margin-bottom:10px;\">2,5×<\u002Fdiv>\n          <div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#62656F;margin-bottom:8px;\">Giovana · clínica<\u002Fdiv>\n          <div style=\"font-family:var(--font-sans);font-size:15px;line-height:1.55;color:#B4B8C4;\">Card de prova: número grande em mono azul, label do cliente, frase em platina.<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- DE PARA -->\n        <div style=\"display:flex;flex-direction:column;gap:10px;justify-content:center;\">\n          <div style=\"display:flex;align-items:center;gap:14px;padding:16px 20px;background:#1A1A22;border:1px solid rgba(226,232,240,0.09);border-radius:4px;\"><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;color:#62656F;\">DE<\u002Fspan><span style=\"font-family:var(--font-sans);font-size:15px;color:#E2E8F0;\">Dono no gargalo.<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center;color:#6E92F0;font-family:var(--font-mono);\">↓<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:14px;padding:16px 20px;background:rgba(30,64,175,0.12);border:1px solid rgba(30,64,175,0.5);border-radius:4px;box-shadow:0 0 34px rgba(30,64,175,0.14);\"><span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;color:#6E92F0;\">PARA<\u002Fspan><span style=\"font-family:var(--font-sans);font-size:15px;color:#fff;\">Dono no comando.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 DIAGRAMA -->\n  <section style=\"position:relative;z-index:2;max-width:none;margin:0 auto;padding:clamp(48px,6vw,80px) clamp(32px,5vw,88px) clamp(56px,7vw,96px);\">\n    <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:14px;\">\n      <span style=\"font-family:var(--font-mono);font-weight:700;font-size:15px;color:#1E40AF;\">05<\u002Fspan>\n      <h2 style=\"font-family:var(--font-serif);font-weight:600;font-size:clamp(24px,3vw,34px);color:#fff;margin:0;\">Elemento-assinatura<\u002Fh2>\n    <\u002Fdiv>\n    <p style=\"font-family:var(--font-sans);font-size:16px;line-height:1.65;color:#B4B8C4;max-width:600px;margin:0 0 36px;\">Arcos do Limiar: ciclos de 90 dias que se abrem do Núcleo (DNA do negócio) para a operação que passa a rodar sozinha. De dono no gargalo a dono no comando.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center;background:#15151D;border:1px solid rgba(226,232,240,0.09);border-radius:8px;padding:clamp(28px,4vw,48px);position:relative;overflow:hidden;\">\n      <div style=\"position:absolute;left:18%;top:50%;transform:translateY(-50%);width:340px;height:340px;background:radial-gradient(circle, rgba(30,64,175,0.34), transparent 70%);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;display:flex;justify-content:center;\">\n        <svg viewBox=\"0 0 300 300\" style=\"width:100%;max-width:300px;overflow:visible;\">\n          <circle cx=\"150\" cy=\"150\" r=\"130\" fill=\"none\" stroke=\"#1E40AF\" stroke-width=\"1.6\" opacity=\"0.45\"><\u002Fcircle>\n          <circle cx=\"150\" cy=\"150\" r=\"98\" fill=\"none\" stroke=\"#2B53C9\" stroke-width=\"1.6\" opacity=\"0.6\"><\u002Fcircle>\n          <circle cx=\"150\" cy=\"150\" r=\"66\" fill=\"none\" stroke=\"#6E92F0\" stroke-width=\"1.6\" opacity=\"0.55\"><\u002Fcircle>\n          <circle cx=\"150\" cy=\"150\" r=\"34\" fill=\"none\" stroke=\"#C9A24A\" stroke-width=\"1.8\" opacity=\"0.75\"><\u002Fcircle>\n          <circle cx=\"150\" cy=\"150\" r=\"5\" fill=\"#C9A24A\"><\u002Fcircle>\n          <text x=\"150\" y=\"14\" text-anchor=\"middle\" fill=\"#7A7E8C\" style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;\">LIMIAR 90d<\u002Ftext>\n          <text x=\"150\" y=\"200\" text-anchor=\"middle\" fill=\"#C9A24A\" style=\"font-family:var(--font-mono);font-size:9px;letter-spacing:0.14em;\">NÚCLEO<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div style=\"position:relative;\">\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:22px;height:2px;background:#1E40AF;opacity:0.6;\"><\u002Fspan><span style=\"font-family:var(--font-mono);font-size:12px;color:#A6AAB6;\">#1E40AF · arco externo · 0.30<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:22px;height:2px;background:#2B53C9;\"><\u002Fspan><span style=\"font-family:var(--font-mono);font-size:12px;color:#A6AAB6;\">#2B53C9 · 0.46<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:22px;height:2px;background:#6E92F0;\"><\u002Fspan><span style=\"font-family:var(--font-mono);font-size:12px;color:#A6AAB6;\">#6E92F0 · 0.40<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;\"><span style=\"width:22px;height:2px;background:#C9A24A;\"><\u002Fspan><span style=\"font-family:var(--font-mono);font-size:12px;color:#A6AAB6;\">#C9A24A · núcleo · 0.48<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-family:var(--font-sans);font-size:14px;line-height:1.6;color:#828693;margin:22px 0 0;\">Atrás do tronco/ombros da foto, nunca cruzando o rosto. Glow azul por baixo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FECHO -->\n  <section style=\"position:relative;z-index:2;background:#08080C;border-top:1px solid rgba(226,232,240,0.08);\">\n    <div style=\"max-width:none;margin:0 auto;padding:clamp(40px,5vw,64px) clamp(32px,5vw,88px);\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n        <div style=\"padding:24px;background:#15151D;border:1px solid rgba(226,232,240,0.09);border-radius:6px;\"><div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#6E92F0;margin-bottom:10px;\">Cantos · raios<\u002Fdiv><p style=\"font-family:var(--font-sans);font-size:14px;line-height:1.6;color:#B4B8C4;margin:0;\">2–4px na maioria, 6px em cards, 8px no máximo. Geometria angular, séria.<\u002Fp><\u002Fdiv>\n        <div style=\"padding:24px;background:#15151D;border:1px solid rgba(226,232,240,0.09);border-radius:6px;\"><div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#6E92F0;margin-bottom:10px;\">Sombras<\u002Fdiv><p style=\"font-family:var(--font-sans);font-size:14px;line-height:1.6;color:#B4B8C4;margin:0;\">Mínimas. A elevação vem da luz (glow azul), não de sombra. Sombra só destaca a foto do fundo.<\u002Fp><\u002Fdiv>\n        <div style=\"padding:24px;background:#15151D;border:1px solid rgba(226,232,240,0.09);border-radius:6px;\"><div style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#6E92F0;margin-bottom:10px;\">Movimento<\u002Fdiv><p style=\"font-family:var(--font-sans);font-size:14px;line-height:1.6;color:#B4B8C4;margin:0;\">Fades e slides curtos. Easing cubic-bezier(.22,.61,.36,1), 140–480ms. Sem bounce.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:#4A4D57;text-align:center;margin:40px 0 0;\">Kit de Estilo · Ciclo da Inovação · Ednaldo Henper · Instituto Foco<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
